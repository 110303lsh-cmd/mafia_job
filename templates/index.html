<!DOCTYPE html>
<html>
<head>
    <title>Mafia Game</title>
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family:Arial; }
        .day { background:#f2f2f2; }
        .night { background:#1a1a2e; color:white; }

        #gameLayout { display:flex; height:100vh; }

        #leftPanel {
            flex:2;
            display:flex;
            flex-direction:column;
            border-right:2px solid #ccc;
        }

        #chat { flex:1; overflow-y:auto; padding:10px; }

        #chatInput {
            display:flex;
            padding:10px;
            border-top:2px solid #ccc;
            background:white;
        }

        #msg { flex:1; padding:10px; }

        button { padding:10px; margin:5px; cursor:pointer; }

        #rightPanel {
            flex:1;
            padding:10px;
            overflow-y:auto;
        }

        li { list-style:none; margin:3px 0; }
        .dead { color:gray; text-decoration:line-through; }

        .card {
            border-radius:12px;
            padding:20px;
            margin:10px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            animation:fadeIn 0.5s;
        }

        .mafia { background:#ff4d4d; color:white; }
        .doctor { background:#4dff88; }
        .police { background:#4da6ff; color:white; }
        .reporter { background:#ffd700; }
        .politician { background:#ffaa00; }
        .spy { background:#444; color:white; }
        .madman { background:#ff66cc; }
        .gambler { background:#8e44ad; color:white; }
        .citizen { background:#ddd; }

        @keyframes fadeIn {
            from {opacity:0; transform:scale(0.8);}
            to {opacity:1; transform:scale(1);}
        }
    </style>
</head>

<body class="day">

<h2 style="padding:10px;">🎮 마피아 게임</h2>

<!-- 로그인 -->
<div id="login">
    <input id="username" placeholder="닉네임 (비우면 관전자)">
    <button onclick="join()">입장</button>
</div>

<!-- 대기실 -->
<div id="lobby" style="display:none;">
    <h3>👥 대기실</h3>
    <ul id="players"></ul>
    <button onclick="startGame()">게임 시작</button>
</div>

<!-- 게임 -->
<div id="game" style="display:none;">

    <p id="myNameText" style="padding:5px; font-weight:bold;"></p>

    <div id="roleCard"></div>

    <p id="phaseText"></p>

    <div id="gameLayout">

        <!-- 채팅 -->
        <div id="leftPanel">
            <ul id="chat"></ul>

            <div id="chatInput">
                <input id="msg" onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()">전송</button>
            </div>
        </div>

        <!-- 오른쪽 -->
        <div id="rightPanel">

            <h3>🟢 살아있는 사람</h3>
            <ul id="aliveList"></ul>

            <h3>💀 죽은 사람</h3>
            <ul id="deadList"></ul>

            <h3>🗳️ 투표</h3>
            <div id="voteButtons"></div>

            <h3>🌙 행동</h3>
            <div id="nightButtons"></div>

            <h3>⭐ 직업 능력</h3>
            <div id="skillButtons"></div>

        </div>

    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
var socket = io();

var players = [];
var myName = "";
var myRole = "";
var isDead = false;
var isSpectator = false;

/* 화면 전환 */
function show(id){
    ["login","lobby","game"].forEach(x=>document.getElementById(x).style.display="none");
    document.getElementById(id).style.display="block";
}

/* 입장 */
function join(){
    myName = username.value;
    socket.emit('join', myName);

    document.getElementById("myNameText").innerText =
        "👤 내 닉네임: " + (myName || "관전자");
}

socket.on('join_success', ()=>show("lobby"));
socket.on('spectator', ()=>isSpectator=true);

/* 유저 목록 */
socket.on('user_list', list=>{
    players = list;

    let ul = document.getElementById("players");
    ul.innerHTML = "";

    list.forEach(n=>{
        let li=document.createElement("li");
        li.innerText="👤 "+n;
        ul.appendChild(li);
    });
});

/* 게임 시작 */
function startGame(){
    socket.emit('start_game');
}

socket.on('game_started', ()=>show("game"));

/* 채팅 */
function sendMsg(){
    if(!msg.value.trim()) return;
    socket.send(msg.value);
    msg.value="";
}

socket.on('message', m=>{
    let li=document.createElement("li");
    li.innerText=m;
    chat.appendChild(li);
    chat.scrollTop=chat.scrollHeight;
});

/* 역할 */
socket.on('role', r=>{
    myRole = r;

    let card=document.getElementById("roleCard");

    card.innerHTML = `🎭 ${r}<br><small>👤 ${myName}</small>`;

    card.className="card "+(
        r==="마피아"?"mafia":
        r==="의사"?"doctor":
        r==="경찰"?"police":
        r==="기자"?"reporter":
        r==="정치인"?"politician":
        r==="스파이"?"spy":
        r==="광인"?"madman":
        r==="도박사"?"gambler":"citizen"
    );

    createSkillButtons();
});

/* 직업 능력 */
function createSkillButtons(){
    let box = document.getElementById("skillButtons");
    box.innerHTML = "";

    if(isDead || isSpectator) return;

    if(myRole==="도박사"){
        box.innerHTML += `
            <select id="gambleTarget"></select>
            <select id="gambleRisk">
                <option value="30">30%</option>
                <option value="50">50%</option>
                <option value="70">70%</option>
            </select>
            <button onclick="gamble()">🎲 도박</button>
        `;
    }

    if(myRole==="스파이"){
        box.innerHTML += `<button onclick="spyCheck()">🕵️ 조사</button>`;
    }

    if(myRole==="기자"){
    box.innerHTML += `<button onclick="report()">📰 공개</button>`;
    }
}

/* 스파이 조사 */
function spyCheck(){
    let t = prompt("조사 대상");
    socket.emit("spy_check", t);
}

/* 도박 */
function gamble(){
    let target = document.getElementById("gambleTarget").value;
    let risk = parseInt(document.getElementById("gambleRisk").value);

    socket.emit("gamble", {
        target: target,
        risk: risk
    });
}

function report(){
    let t = prompt("공개 대상");
    socket.emit("report", t);
}

/* 낮/밤 */
socket.on('phase', p=>{
    phaseText.innerText=p;
    document.body.className=(p==="day")?"day":"night";
});

/* 버튼 */
function createButtons(deadNames){
    voteButtons.innerHTML="";
    nightButtons.innerHTML="";

    if(isDead || isSpectator) return;

    players.forEach(n=>{
        if(deadNames.includes(n)) return;

        let b=document.createElement("button");
        b.innerText=n;
        b.onclick=()=>socket.emit('vote', n);
        voteButtons.appendChild(b);

        let nb=document.createElement("button");
        nb.innerText=n;
        nb.onclick=()=>socket.emit('night_action', n);
        nightButtons.appendChild(nb);
    });
}

/* 도박 대상 */
function updateGambleTargets(deadNames){
    let select = document.getElementById("gambleTarget");
    if(!select) return;

    select.innerHTML = "";

    players.forEach(n=>{
        if(!deadNames.includes(n)){
            let o=document.createElement("option");
            o.value=n;
            o.innerText=n;
            select.appendChild(o);
        }
    });
}

/* 죽은 사람 처리 */
socket.on('dead_list', list=>{
    deadList.innerHTML="";
    aliveList.innerHTML="";

    isDead=false;

    let deadNames=list.map(n=>n.split(" (")[0]);

    list.forEach(n=>{
        let li=document.createElement("li");
        li.innerText=n;
        li.classList.add("dead");
        deadList.appendChild(li);

        if(n.startsWith(myName + " ")) isDead=true;
    });

    players.forEach(n=>{
        if(!deadNames.includes(n)){
            let li=document.createElement("li");
            li.innerText=n;
            aliveList.appendChild(li);
        }
    });

    createButtons(deadNames);
    createSkillButtons();
    updateGambleTargets(deadNames);

    let text = "👤 내 닉네임: " + (myName || "관전자");
    if(isDead) text += " 💀 (사망)";
    document.getElementById("myNameText").innerText = text;
});
</script>

</body>
</html>
